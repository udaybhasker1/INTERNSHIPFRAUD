<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internship Fraud Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f2f2f2; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .red { color: red; font-weight: bold; }
        .green { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Internship Fraud Scan Dashboard</h1>
    <table>
        <tr>
            <th>ID</th>
            <th>Sender</th>
            <th>Subject</th>
            <th>Risk Score (%)</th>
            <th>Status</th>
            <th>Timestamp</th>
        </tr>
        {% for scan in scans %}
        <tr>
            <td>{{ scan.id }}</td>
            <td>{{ scan.sender }}</td>
            <td>{{ scan.subject }}</td>
            <td>{{ scan.risk_score }}</td>
            <td class="{{ 'red' if 'Fraud' in scan.status else 'green' }}">{{ scan.status }}</td>
            <td>{{ scan.timestamp }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
